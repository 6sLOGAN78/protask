version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: protask-db
    environment:
      POSTGRES_DB: protask_db
      POSTGRES_USER: protask_user
      POSTGRES_PASSWORD: protask_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U protask_user -d protask_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: protask-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: protask-backend
    ports:
      - "8080:8080"
    env_file:
      - apps/backend/.env
    environment:
      PROTASK_PRIMARY.ENV: "production"
      PROTASK_SERVER.PORT: "8080"
      PROTASK_SERVER.READ_TIMEOUT: "30"
      PROTASK_SERVER.WRITE_TIMEOUT: "30"
      PROTASK_SERVER.IDLE_TIMEOUT: "60"
      PROTASK_SERVER.CORS_ALLOWED_ORIGINS: "http://localhost:3002"
      PROTASK_DATABASE.HOST: "db"
      PROTASK_DATABASE.PORT: "5432"
      PROTASK_DATABASE.USER: "protask_user"
      PROTASK_DATABASE.PASSWORD: "protask_password"
      PROTASK_DATABASE.NAME: "protask_db"
      PROTASK_DATABASE.SSL_MODE: "disable"
      PROTASK_DATABASE.MAX_OPEN_CONNS: "25"
      PROTASK_DATABASE.MAX_IDLE_CONNS: "25"
      PROTASK_DATABASE.CONN_MAX_LIFETIME: "300"
      PROTASK_DATABASE.CONN_MAX_IDLE_TIME: "300"
      PROTASK_REDIS.ADDRESS: "redis:6379"
      PROTASK_AUTH.SECRET_KEY: "secret"
      PROTASK_INTEGRATION.RESEND_API_KEY: "resend_key"
      PROTASK_AWS.REGION: "us-east-1"
      PROTASK_AWS.ACCESS_KEY_ID: "mock"
      PROTASK_AWS.SECRET_ACCESS_KEY: "mock"
      PROTASK_AWS.UPLOAD_BUCKET: "mock"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_mockkey}
        VITE_API_URL: http://localhost:8080
        VITE_ENV: production
    container_name: protask-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
